apiVersion: kubernetes.crossplane.io/v1alpha1
kind: Object
metadata:
  name: example-configmap
spec:
  forProvider:
    manifest:
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: crossplane-managed-config
        namespace: default
      data:
        app_name: "wacamole-app"
        environment: "development"
        version: "1.0.0"
  providerConfigRef:
    name: kubernetes-provider
